<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <!-- Flask static CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Internal CSS for styling -->
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .result-box {
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .fraud {
            background: #ffe5e5;
            color: #d8000c;
            border: 1px solid #d8000c;
        }

        .not-fraud {
            background: #e6fffa;
            color: #006d5b;
            border: 1px solid #006d5b;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        a:hover {
            background: #5a67d8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Prediction Result</h1>

        <!-- Result Display -->
        <div class="result-box 
            {% if 'Fraud' in prediction_text %}
                fraud
            {% else %}
                not-fraud
            {% endif %}
        ">
            {{ prediction_text }}
        </div>

        <a href="/">Predict Again</a>
    </div>
</body>
</html>
