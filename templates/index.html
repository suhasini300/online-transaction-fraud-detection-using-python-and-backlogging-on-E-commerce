<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>

    <!-- Flask static CSS (optional if you want external file) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Internal CSS for full design -->
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #5a67d8;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #777;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .fraud {
            background: #ffe5e5;
            color: #d8000c;
        }

        .not-fraud {
            background: #e6fffa;
            color: #006d5b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Credit Card Fraud Detection</h1>

        <form action="/predict" method="post">
            <label for="time">Transaction Time (seconds since first transaction)</label>
            <input type="number" id="time" name="time" placeholder="Enter time in seconds" required>

            <label for="amount">Transaction Amount (USD)</label>
            <input type="number" step="0.01" id="amount" name="amount" placeholder="Enter amount" required>

            <!-- Hidden fields for remaining PCA features -->
            {% for i in range(1, 29) %}
                <input type="hidden" id="V{{ i }}" name="V{{ i }}" value="0">
            {% endfor %}

            <button type="submit">Predict Fraud</button>
        </form>

        <!-- Prediction Result -->
        {% if prediction %}
            <div class="result {{ 'fraud' if prediction == 'Fraud' else 'not-fraud' }}">
                Prediction Result: {{ prediction }}
            </div>
        {% endif %}

        <div class="footer">
            Machine Learning Based Fraud Detection System
        </div>
    </div>
</body>
</html>
